name: First CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: ./github-actions-lab

      - name: Run tests
        run: npm test
        working-directory: ./github-actions-lab

      - name: Build project
        run: npm run build
        working-directory: ./github-actions-lab

      - name: Done
        run: echo "🎉 CI pipeline completed!"
